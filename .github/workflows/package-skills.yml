name: Package Skills

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate manifest
        run: |
          python scripts/generate_manifest.py
          git diff --exit-code skills.yaml

      - name: Package all skills
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            if [ -f "${skill_dir}SKILL.md" ]; then
              echo "Packaging ${skill_dir}..."
              python scripts/package_skill.py "${skill_dir}" --output-dir dist
            else
              echo "Skipping ${skill_dir} — no SKILL.md found"
            fi
          done

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: dist/*.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: latest
          name: Latest Skills (rolling)
          body: |
            Rolling release — automatically updated on every push to `main`.

            Contains the latest packaged `.skill` files from the repository.
            For stable releases, use a versioned tag (e.g., `v1.0.0`).

            **Last updated:** ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: dist/*.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
