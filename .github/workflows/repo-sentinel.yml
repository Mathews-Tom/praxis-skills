name: Repo Sentinel

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  file-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for .env files
        run: |
          if find . -name '.env' -not -path './.git/*' | grep -q .; then
            echo "ERROR: .env file(s) found in repository"
            find . -name '.env' -not -path './.git/*'
            exit 1
          fi
          echo "No .env files found"

      - name: Check for credential files
        run: |
          found=0
          for pattern in '*.pem' '*.key' '*.p12'; do
            if find . -name "${pattern}" -not -path './.git/*' | grep -q .; then
              echo "ERROR: Credential file(s) matching ${pattern} found"
              find . -name "${pattern}" -not -path './.git/*'
              found=1
            fi
          done
          if [ "${found}" -eq 1 ]; then
            exit 1
          fi
          echo "No credential files found"

      - name: Check for .claude directory
        run: |
          if [ -d ".claude" ]; then
            echo "ERROR: .claude directory found in repository"
            exit 1
          fi
          echo "No .claude directory found"
